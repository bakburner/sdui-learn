name: SduiDemo
options:
  bundleIdPrefix: com.nba.sdui
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  # Pin Xcode project-file format. XcodeGen 2.45+ defaults to `xcode16_0`
  # (objectVersion 77), which Xcode 15.x refuses to open with a "future
  # Xcode project file format" error.
  projectFormat: xcode15_3
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  SduiCore:
    path: ..

targets:
  SduiDemo:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.nba.sdui.demo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_ASSET_PATHS: ""
    dependencies:
      - package: SduiCore
        product: SduiCore
