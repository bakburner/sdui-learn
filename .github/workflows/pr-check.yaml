name: SDUI Prototype PR Check
run-name: SDUI PR Check ${{ github.ref_name }} triggered by ${{ github.actor }}

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "docker-bake.hcl"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  # -------------------------------------------------------
  # SAST Scan -- static analysis via Checkmarx
  # -------------------------------------------------------
  sast-scan:
    permissions:
      contents: read
    runs-on: ghscan-ubuntu-latest
    steps:
      - name: Checkmarx SAST Scan
        uses: NBA/devops-ng/.github/actions/checkmarx-sast-scan@main
        with:
          project: "sdui-prototype"
          team: "/CxServer/DTC/NextGen-DevOps"
          checkmarx_url: ${{ secrets.CHECKMARX_URL }}
          checkmarx_user: ${{ secrets.CHECKMARX_USER }}
          checkmarx_password: ${{ secrets.CHECKMARX_PASSWORD }}
          checkmarx_client_secret: ${{ secrets.CHECKMARX_CLIENT_SECRET }}

  # -------------------------------------------------------
  # Build -- Docker Bake to build and push to ACR
  # -------------------------------------------------------
  build:
    runs-on: nba-ubuntu-latest
    outputs:
      docker_meta_outputs: ${{ steps.docker_meta.outputs.json }}
      docker_meta_tags: ${{ steps.docker_meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Docker Setup QEMU for Multi-Arch Build
        uses: docker/setup-qemu-action@v3

      - name: Docker Setup Buildx for Multi-Arch Build
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker Container Metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          bake-target: sdui-prototype
          images: |
            ottnpue2imageci002.azurecr.io/devops/sdui-prototype
          tags: |
            type=sha,prefix=pr-
          labels: |
            org.opencontainers.image.description=SDUI Prototype Server

      - name: Login to Azure ACR Non-Prod
        uses: docker/login-action@v3
        with:
          registry: ottnpue2imageci002.azurecr.io
          username: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_NAME }}
          password: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_PW }}

      - name: Docker Bake
        uses: docker/bake-action@v6
        with:
          push: true
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.docker_meta.outputs.bake-file }}
          targets: sdui-prototype
          set: |
            sdui-prototype.args.GIT_SHA=${{ github.sha }}
            sdui-prototype.args.GIT_BRANCH_NAME=${{ github.ref_name }}
            *.cache-to=type=gha,mode=min
            *.cache-from=type=gha

  # -------------------------------------------------------
  # Container Scan -- Wiz image scanning after build
  # -------------------------------------------------------
  wiz-scan:
    runs-on: nba-ubuntu-latest
    needs: build
    steps:
      - name: Run Wiz Scan
        uses: NBA/devops-ng/.github/actions/wiz-scan@main
        with:
          wiz_client_id: ${{ secrets.WIZ_CLIENT_ID }}
          wiz_client_secret: ${{ secrets.WIZ_CLIENT_SECRET }}
          acr_non_prod_username: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_NAME }}
          acr_non_prod_password: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_PW }}
          docker_meta_outputs: ${{ needs.build.outputs.docker_meta_outputs }}
