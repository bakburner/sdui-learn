server:
  port: 8080

spring:
  application:
    name: sdui-composition-service
  threads:
    virtual:
      enabled: true
  jackson:
    # Omit null and empty values from the wire. Typed jsonschema2pojo POJOs
    # default-initialize List/Map fields to empty collections; without this,
    # every emitted AtomicElement would ship `children: []`, `actions: []`,
    # `overlays: []`, etc., turning "field absent" and "field empty" into
    # two indistinguishable wire shapes for clients. NON_EMPTY makes
    # absence the only signal.
    default-property-inclusion: non_empty
  config:
    import: optional:dotenv:.env

# Core API configuration (per-date scoreboards)
core:
  api:
    base-url: https://core-api.nba.com
    subscription-key: ${CORE_API_OPIM_SUBSCRIPTION_KEY:}

# Stats API configuration
stats:
  api:
    base-url: https://stats-trafficcop-prod.nba.com/v0/api
    subscription-key: ${STATS_API_KEY:}

# Ably configuration
ably:
  api:
    key: ${ABLY_SUBSCRIBE_API_KEY:}

# SDUI configuration
sdui:
  schema:
    version: "1.0"
    current-version: "1.0"
    min-supported-version: "1.0"
  cache:
    enabled: true
    ttl-seconds: 60

# Logging
logging:
  level:
    com.nba.sdui: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - correlationId=%X{correlationId} - %msg%n"

# Spring Boot Actuator — health, prometheus, metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      group:
        sdui:
          include: sdui
          show-details: always

# SAF — service-aggregation-framework configuration. Per-upstream resilience,
# cache, and request-collapsing. TTLs follow §8.1: live data short (5–15s);
# post-game / static data long (5–60min). STALE_IF_ERROR is declared per
# upstream so backends serve cached data on transient failure.
saf:
  aggregation:
    default-timeout: 5s
  orchestrator:
    enable-caching: true
    enable-resilience: true
    enable-collapsing: true
    enable-slo-tracking: true
    max-concurrent-aggregations: 0
  slo:
    # Per ServiceOrchestrator.aggregationType, all aggregations are bucketed
    # together under the literal "orchestration" type, so this single threshold
    # covers warm and cold paths across every SDUI screen. The default 500ms
    # is too tight for cold-cache fan-out (e.g. For You first-render hits
    # scoreboard + stories + standings concurrently). Bump to absorb startup
    # variance without hiding genuine regressions.
    thresholds:
      orchestration:
        latency-p95: 750ms
        max-error-rate: 0.01
  cache:
    stale-if-error:
      default-max-stale-age: 600s
  services:
    # Public CDN scoreboard — live, short TTL, request-collapsed.
    scoreboard-cdn:
      resilience:
        bulkhead:
          max-concurrent-calls: 200
        circuit-breaker:
          failure-rate-threshold: 50
          wait-duration-in-open-state: 10s
        retry:
          max-attempts: 2
          wait-duration: 100ms
      cache:
        ttl: 10s
        strategy: STALE_IF_ERROR
        stale-if-error-max-stale-age: 60
      collapsing:
        enabled: true
    # NBA Core API — per-date scoreboards. Past dates are immutable; serve long.
    core-api:
      resilience:
        bulkhead:
          max-concurrent-calls: 100
        circuit-breaker:
          failure-rate-threshold: 50
        retry:
          max-attempts: 2
          wait-duration: 200ms
      cache:
        ttl: 600s
        strategy: STALE_IF_ERROR
        stale-if-error-max-stale-age: 1800
      collapsing:
        enabled: true
    # Public CDN boxscore — live during game, otherwise immutable.
    boxscore-cdn:
      resilience:
        bulkhead:
          max-concurrent-calls: 200
        circuit-breaker:
          failure-rate-threshold: 50
        retry:
          max-attempts: 2
          wait-duration: 100ms
      cache:
        ttl: 15s
        strategy: STALE_IF_ERROR
        stale-if-error-max-stale-age: 120
      collapsing:
        enabled: true
    # Static league schedule — single per-season fetch.
    season-schedule:
      resilience:
        bulkhead:
          max-concurrent-calls: 50
        circuit-breaker:
          failure-rate-threshold: 50
        retry:
          max-attempts: 2
          wait-duration: 200ms
      cache:
        ttl: 3600s
        strategy: STALE_IF_ERROR
        stale-if-error-max-stale-age: 21600
      collapsing:
        enabled: true
    # Stats Trafficcop — detailed live stats.
    stats-trafficcop:
      resilience:
        bulkhead:
          max-concurrent-calls: 100
        circuit-breaker:
          failure-rate-threshold: 50
        retry:
          max-attempts: 2
          wait-duration: 150ms
      cache:
        ttl: 15s
        strategy: STALE_IF_ERROR
        stale-if-error-max-stale-age: 120
      collapsing:
        enabled: true
    # Composed section fragments (A2c) — TwoTierCacheService backing for
    # SectionFragmentCache. Per-fragment TTL is set in code by the composer
    # (volatility-driven); this entry exposes the operator-controlled stale
    # window plus per-service resilience defaults.
    sdui-section-fragment:
      resilience:
        bulkhead:
          max-concurrent-calls: 200
        circuit-breaker:
          failure-rate-threshold: 50
      cache:
        strategy: STALE_IF_ERROR
        stale-if-error-max-stale-age: 60
      collapsing:
        enabled: true
