name: SDUI Prototype Build
run-name: Building SDUI ${{ github.ref_name }} triggered by ${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: nba-ubuntu-latest
    outputs:
      docker_meta_outputs: ${{ steps.docker_meta.outputs.json }}
    steps:
      - uses: actions/checkout@v6

      # SAF (`com.nba:service-aggregation-framework`) resolves from GitHub
      # Packages (https://github.com/NBA/saf, same org as this repo).
      # Credentials are passed to the Docker build as BuildKit secrets so they
      # never land in image layers. The default `GITHUB_TOKEN` has
      # `read:packages` for org-internal artifacts.

      - name: Docker Setup QEMU for Multi-Arch Build
        uses: docker/setup-qemu-action@v3

      - name: Docker Setup Buildx for Multi-Arch Build
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker Container Metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          bake-target: sdui-prototype
          images: |
            ottnpue2imageci002.azurecr.io/devops/sdui-prototype
          tags: |
            type=sha

      - name: Login to Azure ACR Non-Prod
        uses: docker/login-action@v3
        with:
          registry: ottnpue2imageci002.azurecr.io
          username: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_NAME }}
          password: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_PW }}

      - name: Docker Bake
        uses: docker/bake-action@v6
        env:
          GPR_USER: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          push: true
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.docker_meta.outputs.bake-file }}
          targets: sdui-prototype
          set: |
            sdui-prototype.args.GIT_SHA=${{ github.sha }}
            sdui-prototype.args.GIT_BRANCH_NAME=${{ github.ref_name }}
            sdui-prototype.secrets=id=gpr_user,env=GPR_USER
            sdui-prototype.secrets=id=gpr_token,env=GPR_TOKEN
            *.cache-to=type=gha,mode=min
            *.cache-from=type=gha

      - name: Deploy to environment branch
        env:
          IMAGE_TAG: ${{ steps.docker_meta.outputs.version }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin deploy/dev && git checkout -B deploy/dev origin/deploy/dev || {
            git checkout --orphan deploy/dev
            git rm -rf . || true
            git clean -fdx
          }
          git checkout main -- helm/prod-values.yaml
          yq -i ".image.tag = \"$IMAGE_TAG\"" helm/prod-values.yaml
          git add helm/prod-values.yaml
          if git diff --cached --quiet; then
            echo "No changes to deploy (tag already up to date)"
          else
            git commit -m "deploy: update image tag to $IMAGE_TAG"
            git push origin deploy/dev
          fi

  # -------------------------------------------------------
  # Container Scan -- Wiz image scanning after build
  # -------------------------------------------------------
  wiz-scan:
    runs-on: nba-ubuntu-latest
    needs: build
    steps:
      - name: Run Wiz Scan
        uses: NBA/devops-ng/.github/actions/wiz-scan@main
        with:
          wiz_client_id: ${{ secrets.WIZ_CLIENT_ID }}
          wiz_client_secret: ${{ secrets.WIZ_CLIENT_SECRET }}
          acr_non_prod_username: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_NAME }}
          acr_non_prod_password: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_PW }}
          docker_meta_outputs: ${{ needs.build.outputs.docker_meta_outputs }}
