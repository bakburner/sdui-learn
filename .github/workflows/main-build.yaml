name: SDUI Prototype Build
run-name: Building SDUI ${{ github.ref_name }} triggered by ${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: nba-ubuntu-latest
    outputs:
      docker_meta_outputs: ${{ steps.docker_meta.outputs.json }}
    steps:
      - uses: actions/checkout@v6

      # SAF (`com.nba:service-aggregation-framework`) resolves from GitHub
      # Packages (https://github.com/NBA/saf, same org as this repo).
      # GitHub Packages Maven/Gradle registries officially only accept
      # classic personal access tokens (Apps, OIDC, and GITHUB_TOKEN cannot
      # read packages owned by a sibling repo). Authenticate with a classic
      # PAT (`read:packages` scope only) stored as `GH_PACKAGES_READ_TOKEN`.
      # Credentials are passed to the Docker build as BuildKit secrets so
      # they never land in image layers.

      - name: Docker Setup QEMU for Multi-Arch Build
        uses: docker/setup-qemu-action@v3

      - name: Docker Setup Buildx for Multi-Arch Build
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker Container Metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          bake-target: sdui-prototype
          images: |
            ottnpue2imageci002.azurecr.io/devops/sdui-prototype
          tags: |
            type=sha

      - name: Login to Azure ACR Non-Prod
        uses: docker/login-action@v3
        with:
          registry: ottnpue2imageci002.azurecr.io
          username: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_NAME }}
          password: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_PW }}

      - name: Verify GH Packages credentials
        env:
          GPR_USER: ${{ secrets.GH_PACKAGES_READ_USER }}
          GPR_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
        run: |
          set -u
          echo "GPR_USER length: ${#GPR_USER}"
          echo "GPR_TOKEN length: ${#GPR_TOKEN}"
          if printf '%s' "$GPR_USER" | grep -qE '[[:space:]]'; then
            echo "::warning::GPR_USER contains whitespace"
          fi
          if printf '%s' "$GPR_TOKEN" | grep -qE '[[:space:]]'; then
            echo "::warning::GPR_TOKEN contains whitespace"
          fi
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -u "$GPR_USER:$GPR_TOKEN" -I \
            https://maven.pkg.github.com/NBA/saf/com/nba/service-aggregation-framework/1.0.0-SNAPSHOT/maven-metadata.xml)
          echo "GH Packages HTTP status: $STATUS"
          case "$STATUS" in
            200) echo "Credentials work; Docker build should succeed." ;;
            401) echo "::error::401 Unauthorized — secret value is not a valid PAT (typo, stale, whitespace, or SSO-unauthorized for NBA org)."; exit 1 ;;
            403) echo "::error::403 Forbidden — credentials valid but user lacks read access on the SAF package."; exit 1 ;;
            *)   echo "::error::Unexpected status $STATUS"; exit 1 ;;
          esac

      - name: Docker Bake
        uses: docker/bake-action@v6
        env:
          GPR_USER: ${{ secrets.GH_PACKAGES_READ_USER }}
          GPR_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}
        with:
          push: true
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.docker_meta.outputs.bake-file }}
          targets: sdui-prototype
          set: |
            sdui-prototype.args.GIT_SHA=${{ github.sha }}
            sdui-prototype.args.GIT_BRANCH_NAME=${{ github.ref_name }}
            sdui-prototype.secrets=id=gpr_user,env=GPR_USER
            sdui-prototype.secrets=id=gpr_token,env=GPR_TOKEN
            *.cache-to=type=gha,mode=min
            *.cache-from=type=gha

      - name: Deploy to environment branch
        env:
          IMAGE_TAG: ${{ steps.docker_meta.outputs.version }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin deploy/dev && git checkout -B deploy/dev origin/deploy/dev || {
            git checkout --orphan deploy/dev
            git rm -rf . || true
            git clean -fdx
          }
          git checkout main -- helm/prod-values.yaml
          yq -i ".image.tag = \"$IMAGE_TAG\"" helm/prod-values.yaml
          git add helm/prod-values.yaml
          if git diff --cached --quiet; then
            echo "No changes to deploy (tag already up to date)"
          else
            git commit -m "deploy: update image tag to $IMAGE_TAG"
            git push origin deploy/dev
          fi

  # -------------------------------------------------------
  # Container Scan -- Wiz image scanning after build
  # -------------------------------------------------------
  wiz-scan:
    runs-on: nba-ubuntu-latest
    needs: build
    steps:
      - name: Run Wiz Scan
        uses: NBA/devops-ng/.github/actions/wiz-scan@main
        with:
          wiz_client_id: ${{ secrets.WIZ_CLIENT_ID }}
          wiz_client_secret: ${{ secrets.WIZ_CLIENT_SECRET }}
          acr_non_prod_username: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_NAME }}
          acr_non_prod_password: ${{ secrets.OTTNPUE2IMAGECI002_TOKEN_PW }}
          docker_meta_outputs: ${{ needs.build.outputs.docker_meta_outputs }}
